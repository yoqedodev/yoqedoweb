      H620
      Q610 770 610 780
      V810
      Q610 835 585 835
      H565
      Q540 835 540 810
      V780
      Q540 770 530 770
      H450
      Q440 770 440 780
      V810
      Q440 835 415 835
      H395
      Q370 835 370 810
      V780
      Q370 770 360 770
      H330
      Q280 770 280 720
      Z"
      fill="#F7F5FF"/>

    <!-- Receipt lines -->
    <rect x="360" y="420" width="170" height="28" rx="14" fill="#A685FF"/>
    <rect x="360" y="500" width="120" height="28" rx="14" fill="#A685FF"/>
    <circle cx="410" cy="610" r="38" fill="#A685FF"/>
  </g>

  <!-- Subscription Refresh Badge -->
  <g filter="url(#shadow)">
