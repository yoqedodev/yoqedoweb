<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="120" x2="900" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6E35FF"/>
      <stop offset="100%" stop-color="#1E0B73"/>
    </linearGradient>

    <linearGradient id="badge" x1="580" y1="250" x2="850" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE36A"/>
      <stop offset="50%" stop-color="#FF8AC7"/>
      <stop offset="100%" stop-color="#B16CFF"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded App Background -->
  <rect x="40" y="40" width="944" height="944" rx="210" fill="url(#bg)"/>

  <!-- Receipt Shape -->
  <g filter="url(#shadow)">
