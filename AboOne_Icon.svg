      "
      stroke="white" stroke-width="24" stroke-linecap="round"/>

    <path d="
      M645 435
      L610 425
      L625 390
      "
      stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
